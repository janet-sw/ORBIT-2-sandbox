# Configuration for Super-Resolution to Low-Resolution Forecasting

trainer:
  max_epochs: 30
  batch_size: 32
  num_workers: 4
  checkpoint: null  # Path to checkpoint to resume from, or null
  checkpoint_save_path: "/lustre/orion/csc662/proj-shared/janet/forecasting/orbit_main/era5_forecasting_1.0_deg_sprint_truly_disabled_antialias=True_input_refine_cnn=True" #"/lustre/orion/csc662/proj-shared/janet/forecasting/orbit_main/era5_forecasting_1.40625_deg_bilinear_antialias=False_input_refine_cnn=False"
  data_type: "bfloat16"  # "float32", "bfloat16", "float16"
  train_loss: "lat_mse"  # this field is not used by the training script, loss is hardcoded
  num_gpus: 16
  buffer_size: 100

parallelism:
  fsdp: 1
  simple_ddp: 1
  tensor_par: 1
  seq_par: 1

data:
  # era5_dir: "/lustre/orion/lrn036/world-shared/data/superres/era5/1.40625_deg/"
  # era5_dir: "/lustre/orion/lrn036/world-shared/data/superres/era5/1.0_deg/"
  # era5_dir: "/lustre/orion/lrn036/world-shared/data/superres/era5/0.25_deg/"
  # era5_dir: "/lustre/orion/world-shared/lrn036/jyc/frontier/ClimaX-v2/data/ERA5-1hr-superres/1.0_deg/"
  era5_dir: "xd"
  forecast_type: "direct"  # "direct", "iterative", "continuous"
  pred_range: 120  # lead time [6, 24, 72, 120, 240]
  enable_monthly_loader: True
  
  # Input variables
  variables:
    - "temperature"
    # - "geopotential"
    # - "u_component_of_wind"
    - "2m_temperature"
    # - "2m_temperature_max"
    # - "2m_temperature_min"
    - "10m_u_component_of_wind"
    - "10m_v_component_of_wind"
    - "lattitude"
    - "land_sea_mask"
    - "orography"
    # - "landcover"
  
  # Output variables
  out_variables:
    - "2m_temperature"

  # Variable weights for loss calculation
  var_weights:
    2m_temperature: 1.0
    10m_u_component_of_wind: 1.0
    10m_v_component_of_wind: 1.0

model:
  preset: "res_slimvit"  # Model architecture, res_slimvit_adaptive
  
  # Image dimensions
  img_size: [180, 360]  # Low-resolution input [H, W]
  superres_factor: 1 # Super-resolution factor
  # Downsampling mode options:
  #   Interpolation: "area", "bilinear", "bicubic", "nearest"
  #   Pooling (faster): "max_pool", "avg_pool"
  downsample_mode: "bilinear"
  antialias: True  # Whether to use antialiasing when downsampling (only applicable for interpolation modes)
  
  # Model architecture
  history: 1  # Number of historical timesteps
  cnn_ratio: 4
  patch_size: 2  
  embed_dim: 256
  depth: 12
  decoder_depth: 4
  num_heads: 4
  mlp_ratio: 4.0
  drop_path: 0.1
  drop_rate: 0.1
  learn_pos_emb: True
  input_refine_cnn: True  # Optional: Whether to use input refining 3x3 CNN

  # # ─── Adaptive sparsity parameters ───
  keep_ratio: 0.25          # Keep 25% of tokens in sparse blocks (128 of 512)
  num_dense_early: 2        # First 2 blocks: dense (all tokens)
  num_sparse_middle: 8      # Middle 2 blocks: sparse (only hard tokens)
  # num_dense_late: auto    # Remaining 2 blocks: dense (computed as depth - early - middle)
  cnn_hidden_dim: 64        # Hidden dim of ConvNeXt CNN path
  cnn_num_blocks: 3         # Number of ConvNeXt blocks
  difficulty_temp: 1.0      # Temperature for difficulty sigmoid (lower = sharper)

  # Optimizer settings
  base_lr: 5e-3  # Base learning rate scaled by (num_gpus ** 0.8)
  weight_decay: 0.00001
  beta_1: 0.9
  beta_2: 0.99
  
  # Scheduler settings
  warmup_epochs: 5
  warmup_start_lr: 1e-6
  eta_min: 1e-8